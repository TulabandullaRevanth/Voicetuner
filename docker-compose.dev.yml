name: voicetuner

# VoiceTuner — local development stack
#
# Used by ./start.sh — do not run this directly.
# Backend is exposed on 127.0.0.1:17493 (no nginx/TLS).
# PostgreSQL runs on the HOST (not in Docker) — ./start.sh creates
# the database/user if needed before starting this stack.
# The Vite dev server runs outside Docker for hot-reload.

services:
  voicetuner:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:17493:17493"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: resolves to host; macOS: set automatically by Docker Desktop
    environment:
      - LOG_LEVEL=debug
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - DATABASE_URL=${DATABASE_URL:-postgresql://voicetuner:voicetuner_dev@host.docker.internal:5433/voicetuner}
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - TTS_PROVIDER=${TTS_PROVIDER:-auto}
      - STT_PROVIDER=${STT_PROVIDER:-auto}
      - VOICETUNER_WHISPER_PREFETCH=${VOICETUNER_WHISPER_PREFETCH:-base}
    volumes:
      - voicetuner-dev-data:/app/data
      - huggingface-dev-cache:/home/voicetuner/.cache/huggingface
      - whisper-dev-cache:/home/voicetuner/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17493/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

volumes:
  voicetuner-dev-data:
  huggingface-dev-cache:
  whisper-dev-cache:

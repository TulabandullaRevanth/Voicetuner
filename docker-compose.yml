# VoiceTuner — on-prem Docker Compose stack
#
# Quick start:
#   1. bash scripts/gen-certs.sh          # generate self-signed TLS cert (one-time)
#   2. cp .env.example .env && $EDITOR .env  # add SARVAM_API_KEY etc.
#   3. docker compose up -d
#
# The API is reachable at https://localhost (port 443).
# HTTP on port 80 auto-redirects to HTTPS.

services:
  # ── nginx: TLS termination + reverse proxy ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/voicetuner.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      voicetuner:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voicetuner-net

  # ── voicetuner backend ───────────────────────────────────────────────
  voicetuner:
    build: .
    container_name: voicetuner
    restart: unless-stopped

    # Only exposed internally; nginx is the public entry point.
    expose:
      - "17493"

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

      # ── Speech providers ─────────────────────────────────────────────
      # Sarvam AI — required for Hindi/Telugu TTS+STT (free tier).
      # Get a key at https://dashboard.sarvam.ai
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}

      # Groq Whisper — optional cloud STT fallback (free tier).
      # Get a key at https://console.groq.com
      - GROQ_API_KEY=${GROQ_API_KEY:-}

      # ElevenLabs — optional premium TTS + voice cloning (paid).
      # Get a key at https://elevenlabs.io
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}

      # ── Language / provider routing ──────────────────────────────────
      # Override which provider handles each modality (auto | local | sarvam | groq).
      - TTS_PROVIDER=${TTS_PROVIDER:-auto}
      - STT_PROVIDER=${STT_PROVIDER:-auto}

      # Pre-download Whisper model on startup (base | small | medium | large | turbo).
      - VOICETUNER_WHISPER_PREFETCH=${VOICETUNER_WHISPER_PREFETCH:-base}

    volumes:
      # Named volume for all persistent data (profiles, DB, captures, audio).
      - voicetuner-data:/app/data

      # HuggingFace model cache — survives container rebuilds.
      - huggingface-cache:/home/voicetuner/.cache/huggingface

      # Whisper model cache.
      - whisper-cache:/home/voicetuner/.cache/whisper

    networks:
      - voicetuner-net

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  voicetuner-net:
    driver: bridge

volumes:
  voicetuner-data:
  huggingface-cache:
  whisper-cache:

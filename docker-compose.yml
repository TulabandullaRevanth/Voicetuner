name: voicetuner

# VoiceTuner — on-prem production stack
#
# Quick start (production):
#   1. bash scripts/gen-certs.sh            # one-time TLS cert
#   2. cp .env.example .env && $EDITOR .env # add API keys
#   3. docker compose up -d
#
# For local dev use ./start.sh instead — no TLS, hot-reload frontend.
#
# The API is reachable at https://localhost (port 443).
# HTTP on port 80 auto-redirects to HTTPS.

services:
  # ── postgres ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicetuner
      POSTGRES_USER: voicetuner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voicetuner_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - voicetuner-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicetuner -d voicetuner"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── nginx: TLS termination + reverse proxy ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/voicetuner.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      voicetuner:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voicetuner-net

  # ── voicetuner backend ───────────────────────────────────────────────
  voicetuner:
    build: .
    container_name: voicetuner
    restart: unless-stopped

    # Only exposed internally; nginx is the public entry point.
    expose:
      - "17493"

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

      # ── Database ──────────────────────────────────────────────────────
      - DATABASE_URL=postgresql://voicetuner:${POSTGRES_PASSWORD:-voicetuner_dev}@postgres:5432/voicetuner

      # ── Speech providers ─────────────────────────────────────────────
      # Sarvam AI — required for Hindi/Telugu TTS+STT (free tier).
      # Get a key at https://dashboard.sarvam.ai
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}

      # Groq Whisper — optional cloud STT fallback (free tier).
      # Get a key at https://console.groq.com
      - GROQ_API_KEY=${GROQ_API_KEY:-}

      # ElevenLabs — optional premium TTS + voice cloning (paid).
      # Get a key at https://elevenlabs.io
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}

      # ── Language / provider routing ──────────────────────────────────
      - TTS_PROVIDER=${TTS_PROVIDER:-auto}
      - STT_PROVIDER=${STT_PROVIDER:-auto}

      # Pre-download Whisper model on startup (base | small | medium | large | turbo).
      - VOICETUNER_WHISPER_PREFETCH=${VOICETUNER_WHISPER_PREFETCH:-base}

    volumes:
      - voicetuner-data:/app/data
      - huggingface-cache:/home/voicetuner/.cache/huggingface
      - whisper-cache:/home/voicetuner/.cache/whisper

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - voicetuner-net

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  voicetuner-net:
    driver: bridge

volumes:
  postgres-data:
  voicetuner-data:
  huggingface-cache:
  whisper-cache:
